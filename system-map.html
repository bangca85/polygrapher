<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Polygrapher — polygrapher</title>
<script src="https://unpkg.com/cytoscape@3.30.4/dist/cytoscape.min.js"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'SF Mono', 'Fira Code', 'Cascadia Code', 'Consolas', monospace;
    background: #0d1117;
    color: #c9d1d9;
    height: 100vh;
    overflow: hidden;
    display: flex;
    flex-direction: column;
  }

  /* Header */
  .header {
    display: flex;
    align-items: center;
    gap: 16px;
    padding: 12px 20px;
    background: #161b22;
    border-bottom: 1px solid #30363d;
    flex-shrink: 0;
    z-index: 10;
  }
  .header h1 {
    font-size: 14px;
    font-weight: 600;
    color: #58a6ff;
    white-space: nowrap;
  }
  .header .stats {
    font-size: 12px;
    color: #8b949e;
    white-space: nowrap;
  }
  .search-box {
    flex: 1;
    max-width: 420px;
    position: relative;
  }
  .search-box input {
    width: 100%;
    padding: 6px 12px 6px 32px;
    background: #0d1117;
    border: 1px solid #30363d;
    border-radius: 6px;
    color: #c9d1d9;
    font-size: 13px;
    font-family: inherit;
    outline: none;
    transition: border-color 0.15s;
  }
  .search-box input:focus {
    border-color: #58a6ff;
    box-shadow: 0 0 0 3px rgba(88,166,255,0.1);
  }
  .search-box input::placeholder { color: #484f58; }
  .search-box::before {
    content: '⌕';
    position: absolute;
    left: 10px;
    top: 50%;
    transform: translateY(-50%);
    color: #484f58;
    font-size: 14px;
    pointer-events: none;
  }
  .search-count {
    font-size: 11px;
    color: #8b949e;
    white-space: nowrap;
  }

  /* Main */
  .main {
    display: flex;
    flex: 1;
    overflow: hidden;
  }

  /* Graph */
  #cy {
    flex: 1;
    background: #0d1117;
  }

  /* Detail Panel */
  .detail-panel {
    width: 360px;
    background: #161b22;
    border-left: 1px solid #30363d;
    overflow-y: auto;
    flex-shrink: 0;
    transition: transform 0.2s ease;
    padding: 0;
  }
  .detail-panel.hidden {
    width: 0;
    padding: 0;
    border: none;
    overflow: hidden;
  }
  .panel-header {
    padding: 16px 20px 12px;
    border-bottom: 1px solid #30363d;
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
  }
  .panel-header h2 {
    font-size: 16px;
    font-weight: 600;
    color: #f0f6fc;
    word-break: break-all;
  }
  .panel-close {
    background: none;
    border: none;
    color: #8b949e;
    font-size: 18px;
    cursor: pointer;
    padding: 2px 6px;
    border-radius: 4px;
  }
  .panel-close:hover { background: #21262d; color: #c9d1d9; }
  .panel-section {
    padding: 12px 20px;
    border-bottom: 1px solid #21262d;
  }
  .panel-section h3 {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    color: #8b949e;
    margin-bottom: 8px;
  }
  .panel-row {
    display: flex;
    justify-content: space-between;
    padding: 3px 0;
    font-size: 13px;
  }
  .panel-row .label { color: #8b949e; }
  .panel-row .value { color: #c9d1d9; text-align: right; }
  .panel-signature {
    font-size: 12px;
    color: #7ee787;
    background: #0d1117;
    padding: 8px 12px;
    border-radius: 6px;
    overflow-x: auto;
    white-space: pre;
    margin-top: 4px;
  }
  .file-link {
    color: #58a6ff;
    text-decoration: none;
    cursor: pointer;
    font-size: 13px;
  }
  .file-link:hover { text-decoration: underline; }
  .connection-item {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 4px 0;
    font-size: 13px;
  }
  .connection-item .arrow { color: #484f58; }
  .connection-item .conn-name {
    color: #58a6ff;
    cursor: pointer;
  }
  .connection-item .conn-name:hover { text-decoration: underline; }
  .connection-item .conn-type {
    font-size: 11px;
    color: #8b949e;
    background: #21262d;
    padding: 1px 6px;
    border-radius: 10px;
  }

  /* Legend */
  .legend {
    display: flex;
    gap: 12px;
    align-items: center;
  }
  .legend-item {
    display: flex;
    align-items: center;
    gap: 4px;
    font-size: 11px;
    color: #8b949e;
  }
  .legend-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    display: inline-block;
  }

  /* Node type badge */
  .type-badge {
    display: inline-block;
    font-size: 11px;
    padding: 1px 8px;
    border-radius: 10px;
    font-weight: 500;
  }
  .type-function { background: #1f3a5f; color: #58a6ff; }
  .type-handler { background: #2c1f3f; color: #bc8cff; }
  .type-service { background: #1f3f2c; color: #7ee787; }
  .type-route { background: #3f2c1f; color: #f0883e; }
  .type-component { background: #3f1f2c; color: #ff7b72; }
</style>
</head>
<body>

<div class="header">
  <h1>⬡ polygrapher</h1>
  <div class="stats">0 nodes · 0 edges</div>
  <div class="search-box">
    <input type="text" id="searchInput" placeholder="Search functions, handlers, files..." />
  </div>
  <div class="search-count" id="searchCount"></div>
  <div class="legend">
    <div class="legend-item"><span class="legend-dot" style="background:#58a6ff"></span>function</div>
    <div class="legend-item"><span class="legend-dot" style="background:#bc8cff"></span>handler</div>
    <div class="legend-item"><span class="legend-dot" style="background:#7ee787"></span>service</div>
    <div class="legend-item"><span class="legend-dot" style="background:#f0883e"></span>route</div>
  </div>
</div>

<div class="main">
  <div id="cy"></div>
  <div class="detail-panel hidden" id="detailPanel"></div>
</div>

<script>
const ROOT_PATH = "/Users/bangca/bangca/personal/polygrapher";
const GRAPH_DATA = {"meta":{"repo":"polygrapher","languages":["typescript"],"generatedAt":"2026-03-25T08:08:14.752Z","polygrapher":"0.1.0"},"nodes":[],"edges":[]};

const NODE_COLORS = {
  'function': '#58a6ff',
  'handler': '#bc8cff',
  'service': '#7ee787',
  'route':   '#f0883e',
  'component': '#ff7b72',
};

// Build Cytoscape elements
const elements = [];
GRAPH_DATA.nodes.forEach(n => {
  elements.push({
    data: {
      id: n.id,
      label: n.name,
      type: n.type,
      language: n.language,
      file: n.file,
      line: n.line,
      signature: n.signature,
      repo: n.repo,
      nodeColor: NODE_COLORS[n.type] || '#8b949e',
    }
  });
});
GRAPH_DATA.edges.forEach((e, i) => {
  elements.push({
    data: {
      id: 'e' + i,
      source: e.source,
      target: e.target,
      edgeType: e.type,
      protocol: e.protocol,
      metadata: e.metadata || {},
      edgeColor: e.type === 'routes-to' ? '#f0883e' : e.type === 'calls' ? '#484f58' : '#30363d',
    }
  });
});

// Init Cytoscape
const cy = cytoscape({
  container: document.getElementById('cy'),
  elements: elements,
  style: [
    {
      selector: 'node',
      style: {
        'background-color': 'data(nodeColor)',
        'label': 'data(label)',
        'color': '#c9d1d9',
        'font-size': '11px',
        'font-family': "'SF Mono', 'Fira Code', monospace",
        'text-valign': 'bottom',
        'text-margin-y': 6,
        'width': 24,
        'height': 24,
        'border-width': 2,
        'border-color': 'data(nodeColor)',
        'background-opacity': 0.2,
        'text-outline-color': '#0d1117',
        'text-outline-width': 2,
        'transition-property': 'opacity, background-color, border-color',
        'transition-duration': '0.15s',
      }
    },
    {
      selector: 'node.faded',
      style: { 'opacity': 0.15 }
    },
    {
      selector: 'node.highlighted',
      style: {
        'border-width': 3,
        'background-opacity': 0.6,
        'width': 32,
        'height': 32,
        'font-size': '13px',
        'font-weight': 'bold',
      }
    },
    {
      selector: 'node.selected-node',
      style: {
        'border-width': 3,
        'border-color': '#f0f6fc',
        'background-opacity': 0.8,
        'width': 36,
        'height': 36,
      }
    },
    {
      selector: 'edge',
      style: {
        'width': 1.5,
        'line-color': 'data(edgeColor)',
        'target-arrow-color': 'data(edgeColor)',
        'target-arrow-shape': 'triangle',
        'curve-style': 'bezier',
        'arrow-scale': 0.8,
        'opacity': 0.6,
        'transition-property': 'opacity, line-color',
        'transition-duration': '0.15s',
      }
    },
    {
      selector: 'edge.faded',
      style: { 'opacity': 0.08 }
    },
    {
      selector: 'edge.highlighted',
      style: { 'opacity': 1, 'width': 2.5 }
    },
  ],
  layout: {
    name: 'cose',
    animate: false,
    nodeDimensionsIncludeLabels: true,
    nodeRepulsion: function() { return 8000; },
    idealEdgeLength: function() { return 120; },
    gravity: 0.4,
    numIter: 500,
    padding: 40,
  },
  minZoom: 0.1,
  maxZoom: 5,
});

// ---- SEARCH ----
const searchInput = document.getElementById('searchInput');
const searchCount = document.getElementById('searchCount');

searchInput.addEventListener('input', (e) => {
  const query = e.target.value.trim().toLowerCase();
  if (!query) {
    cy.elements().removeClass('faded highlighted');
    searchCount.textContent = '';
    return;
  }

  const matched = cy.nodes().filter(n => {
    const name = (n.data('label') || '').toLowerCase();
    const file = (n.data('file') || '').toLowerCase();
    const type = (n.data('type') || '').toLowerCase();
    return name.includes(query) || file.includes(query) || type.includes(query);
  });

  cy.elements().addClass('faded').removeClass('highlighted');
  matched.removeClass('faded').addClass('highlighted');
  matched.connectedEdges().removeClass('faded').addClass('highlighted');

  searchCount.textContent = matched.length + ' match' + (matched.length !== 1 ? 'es' : '');

  if (matched.length > 0) {
    cy.animate({ fit: { eles: matched, padding: 60 }, duration: 300 });
  }
});

// ---- DETAIL PANEL ----
const detailPanel = document.getElementById('detailPanel');

function openPanel(nodeData) {
  const n = nodeData;
  const absPath = ROOT_PATH + '/' + n.file;
  const vscodeLink = 'vscode://file/' + absPath + ':' + n.line;

  // Find connections
  const incoming = GRAPH_DATA.edges.filter(e => e.target === n.id);
  const outgoing = GRAPH_DATA.edges.filter(e => e.source === n.id);
  const nodeMap = {};
  GRAPH_DATA.nodes.forEach(nd => nodeMap[nd.id] = nd.name);

  const typeClass = 'type-' + n.type;

  detailPanel.innerHTML = `
    <div class="panel-header">
      <h2>${n.label}</h2>
      <button class="panel-close" onclick="closePanel()">✕</button>
    </div>
    <div class="panel-section">
      <h3>Info</h3>
      <div class="panel-row"><span class="label">Type</span><span class="value"><span class="type-badge ${typeClass}">${n.type}</span></span></div>
      <div class="panel-row"><span class="label">Language</span><span class="value">${n.language}</span></div>
      <div class="panel-row"><span class="label">File</span><span class="value"><a class="file-link" href="${vscodeLink}" title="Open in VS Code">${n.file}:${n.line}</a></span></div>
    </div>
    <div class="panel-section">
      <h3>Signature</h3>
      <div class="panel-signature">${n.signature || '—'}</div>
    </div>
    ${incoming.length > 0 ? `
    <div class="panel-section">
      <h3>Incoming (${incoming.length})</h3>
      ${incoming.map(e => `
        <div class="connection-item">
          <span class="conn-name" onclick="focusNode('${e.source}')">${nodeMap[e.source] || e.source}</span>
          <span class="arrow">→</span>
          <span class="conn-type">${e.type}/${e.protocol}</span>
        </div>
      `).join('')}
    </div>
    ` : ''}
    ${outgoing.length > 0 ? `
    <div class="panel-section">
      <h3>Outgoing (${outgoing.length})</h3>
      ${outgoing.map(e => `
        <div class="connection-item">
          <span class="arrow">→</span>
          <span class="conn-name" onclick="focusNode('${e.target}')">${nodeMap[e.target] || e.target}</span>
          <span class="conn-type">${e.type}/${e.protocol}</span>
        </div>
      `).join('')}
    </div>
    ` : ''}
  `;

  detailPanel.classList.remove('hidden');
}

function closePanel() {
  detailPanel.classList.add('hidden');
  cy.nodes().removeClass('selected-node');
}

function focusNode(nodeId) {
  const node = cy.getElementById(nodeId);
  if (node.length > 0) {
    cy.nodes().removeClass('selected-node');
    node.addClass('selected-node');
    cy.animate({ center: { eles: node }, zoom: 2, duration: 300 });
    openPanel(node.data());
  }
}

cy.on('tap', 'node', (evt) => {
  cy.nodes().removeClass('selected-node');
  evt.target.addClass('selected-node');
  openPanel(evt.target.data());
});

cy.on('tap', (evt) => {
  if (evt.target === cy) {
    closePanel();
  }
});
</script>
</body>
</html>
